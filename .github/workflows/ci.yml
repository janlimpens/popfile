name: CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl 5.40
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - name: Install Carton
        run: cpanm --notest Carton

      - name: Install dependencies
        run: carton install

      - name: Run tests
        run: carton exec prove -l t/

      - name: Syntax check all modules
        run: |
          find . -name '*.pm' -not -path './lib/*' -not -path './local/*' -print0 \
            | xargs -0 -I{} perl -Ilib -I. -c {} 2>&1
