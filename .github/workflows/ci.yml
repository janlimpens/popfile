name: CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Start Dovecot
        run: |
          docker compose -f docker-compose.test.yml up -d
          for i in $(seq 1 15); do
            docker compose -f docker-compose.test.yml exec -T imap sh -c 'echo OK' 2>/dev/null && break
            sleep 1
          done

      - name: Set up Perl 5.40
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - name: Install Carton
        run: cpanm --notest Carton

      - name: Install dependencies
        run: carton install

      - name: Run tests
        run: carton exec prove -l t/

      - name: Syntax check all modules
        run: |
          find . -name '*.pm' -not -path './lib/*' -not -path './local/*' -not -path './vendor/*' -print0 \
            | xargs -0 -I{} perl -Ilib -I. -Ivendor/perl-querybuilder/lib -c {} 2>&1
