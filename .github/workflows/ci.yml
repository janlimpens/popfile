name: CI

on:
  push:
    branches: [ main, 'feat/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install UI dependencies
        run: npm ci
        working-directory: ui
      - name: Build UI
        run: npm run build
        working-directory: ui

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Start Dovecot
        run: |
          docker compose -f docker-compose.test.yml up -d
          for i in $(seq 1 15); do
            docker compose -f docker-compose.test.yml exec -T imap sh -c 'echo OK' 2>/dev/null && break
            sleep 1
          done

      - name: Set up Perl 5.40
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.40'

      - name: Install Carton
        run: cpanm --notest Carton

      - name: Install dependencies
        run: carton install

      - name: Run tests
        run: carton exec prove -l t/

      - name: Syntax check all modules
        run: |
          find . -name '*.pm' -not -path './lib/*' -not -path './local/*' -not -path './vendor/*' -print0 \
            | xargs -0 -I{} perl -Ilib -I. -Ivendor/perl-querybuilder/lib -c {} 2>&1

  publish:
    needs: [build-ui, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Build UI (for Docker)
        run: |
          npm ci
          npm run build
        working-directory: ui
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
